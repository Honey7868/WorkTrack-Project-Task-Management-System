{% extends 'base.html' %}
{% block title %}Login | WorkTrack{% endblock %}

{% block content %}
<div class="min-h-[85vh] flex items-center justify-center">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-gray-100 relative overflow-hidden">
        
        <!-- Decorative background element -->
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-indigo-600"></div>
        
        <div class="text-center border-b border-gray-100 pb-6 mb-6">
            <div class="mb-4 flex flex-col items-center justify-center">
                <div class="h-14 w-14 bg-gradient-to-tr from-gray-900 to-[#1e293b] rounded-xl shadow-[0_4px_15px_rgb(0,0,0,0.2)] flex items-center justify-center mb-4 transform -rotate-3 hover:rotate-0 transition-transform cursor-default">
                    <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                </div>
                <div class="font-extrabold text-3xl tracking-widest text-gray-900">
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">WORK</span>TRACK
                </div>
                <div class="text-[10px] font-bold text-indigo-500/70 tracking-[0.25em] mt-2 uppercase flex items-center">
                    <span class="w-4 h-px bg-indigo-200 mr-2"></span>
                    Official Office Portal
                    <span class="w-4 h-px bg-indigo-200 ml-2"></span>
                </div>
            </div>

            <h2 class="mt-4 text-xl font-bold text-gray-800 tracking-tight">
                Welcome Back
            </h2>
            <p class="mt-1 text-xs text-gray-500 font-medium">
                Enter your credentials to securely access your workspace
            </p>
        </div>
        
        <form class="mt-8 space-y-6" method="POST">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-md animate-pulse">
                    <p class="text-sm text-red-700 font-medium">Invalid username or password.</p>
                </div>
            {% endif %}
            
            <div class="space-y-4 shadow-sm">
                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input id="id_username" name="username" type="text" required class="appearance-none relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm transition-all" placeholder="Enter your username">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label for="id_password" class="block text-sm font-medium text-gray-700">Password</label>
                    </div>
                    <input id="id_password" name="password" type="password" required class="appearance-none relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm transition-all" placeholder="Enter your password">
                </div>
            </div>
            
            <div class="pt-2">
                <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-lg text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 shadow-lg transform transition-all duration-200 hover:-translate-y-1">
                    Sign in
                    <svg class="ml-2 w-5 h-5 text-indigo-200 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
